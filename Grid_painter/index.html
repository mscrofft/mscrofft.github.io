<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <title>Grid Painter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <link rel="stylesheet" href="../shared/ui-theme.css"/>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas { display: block; }

    /* overlay MIDI — posicionamento; estilos de fonte/cor vêm do ui-theme.js */
    #midiOverlay {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      padding: 10px 12px;
      border-radius: 2px;
      backdrop-filter: blur(6px);
      max-width: 360px;
      pointer-events: none;
      font-family: var(--ui-font, 'IBM Plex Mono', monospace);
      font-size: 11px;
      line-height: 1.45;
      background: var(--ui-bg-panel, rgba(0,0,0,0.82));
      border: 1px solid var(--ui-border, rgba(255,255,255,0.12));
      color: var(--ui-fg, #fff);
    }
    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 10px;
      margin-left: 6px;
      border: 1px solid var(--ui-border, rgba(255,255,255,0.12));
      background: rgba(255,255,255,0.06);
    }
    .ok   { color: #4caf7d; }
    .warn { color: #f0b429; }
    .err  { color: #e05c5c; }
    .mono {
      font-family: var(--ui-font, 'IBM Plex Mono', monospace);
      font-size: 10px;
      color: var(--ui-muted, rgba(255,255,255,0.45));
      margin-top: 5px;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <a class="ui-back" href="../index.html">&lt; back</a>
  <input type="file" id="customSvg" accept=".svg" style="display:none"/>

  <div id="midiOverlay">
    <div><b>WebMIDI</b><span id="midiStatus" class="pill warn">verificando…</span></div>
    <div class="mono" id="lastMidi">—</div>
    <div class="mono" id="mapEcho"></div>
  </div>

  <!-- sistema de tema (deve vir antes do sketch) -->
  <script src="./ui-theme.js"></script>
  <!-- sketch principal -->
  <script src="./sketch.js"></script>
</body>
</html>
