<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Grid Painter v9.5 FULL (dat.GUI)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#fff;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial}
    canvas{display:block}
    #midiOverlay{
      position:fixed; left:12px; bottom:12px; z-index:10;
      padding:10px 12px; border-radius:12px;
      background:rgba(255,255,255,.85); border:1px solid rgba(0,0,0,.12);
      backdrop-filter: blur(6px);
      font-size:12px; line-height:1.35; color:#111;
      max-width:360px;
      pointer-events:none;
    }
    #midiOverlay .pill{display:inline-block;border-radius:999px;padding:2px 8px;font-size:11px;margin-left:6px;border:1px solid rgba(0,0,0,.12);background:#f2f2f2}
    #midiOverlay .ok{color:#0a7d33}
    #midiOverlay .warn{color:#c17c00}
    #midiOverlay .err{color:#b00020}
    #midiOverlay .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;color:#333;margin-top:6px;white-space:pre-wrap;word-break:break-word}
  </style>
</head>
<body>
  <input type="file" id="customSvg" accept=".svg" style="display:none" />
  <div id="midiOverlay">
    <div><b>WebMIDI</b><span id="midiStatus" class="pill warn">verificando...</span></div>
    <div class="mono" id="lastMidi">—</div>
    <div class="mono" id="mapEcho"></div>
  </div>

  <script src="sketch.js"></script>
</body>
</html>
