<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <title>Bitmap/Dithering — Imagem & Vídeo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
  <link rel="stylesheet" href="../shared/ui-theme.css"/>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0b0b0d;
    }
    canvas {
      display: block;
      background: #0b0b0d;
    }
    /* hint — estilo vem do ui-theme.js, aqui apenas posicionamento */
    #hint {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      padding: 8px 12px;
      border-radius: 2px;
      backdrop-filter: blur(6px);
      max-width: 320px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <a class="ui-back" href="../index.html">&lt; back</a>
  <input accept="image/*,video/mp4,video/webm" id="file" type="file" style="display:none"/>
  <div id="hint">Use o painel → <b>Upload image / video…</b></div>

  <!-- sistema de tema (deve vir antes do sketch) -->
  <script src="./ui-theme.js"></script>
  <!-- sketch principal -->
  <script src="./sketch.js"></script>
</body>
</html>
