<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <title>Bitmap/Dithering — Imagem & Vídeo (p5.js + dat.GUI)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>
  <style>
    :root { color-scheme: dark; }
    html,body{margin:0;height:100%;overflow:hidden;background:#0b0b0d}
    canvas{display:block;background:#0b0b0d}
    /* small hint overlay */
    #hint{
      position:fixed; left:12px; bottom:12px; z-index:10;
      font:12px/1.35 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:rgba(255,255,255,.75);
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.08);
      padding:8px 10px; border-radius:12px;
      backdrop-filter: blur(6px);
      max-width:420px;
      pointer-events:none;
    }
  </style>
</head>
<body>
  <input accept="image/*,video/mp4,video/webm" id="file" type="file" style="display:none"/>
  <div id="hint">Use o dat.GUI (canto superior direito) → <b>Source → Upload</b>.</div>
  <script src="./sketch.js"></script>
</body>
</html>
