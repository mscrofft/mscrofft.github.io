<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Visuals App — Full v2 (dat.GUI)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html,body{height:100%; margin:0; background:#000; overflow:hidden; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
    canvas{display:block}
    /* Optional swatches strip */
    #swatchesBar{
      position:fixed; left:12px; bottom:12px;
      display:flex; gap:6px; flex-wrap:wrap;
      padding:8px; border-radius:12px;
      background:rgba(0,0,0,.55); backdrop-filter: blur(6px);
      z-index:10;
    }
    #swatchesBar .sw{
      width:22px; height:14px; border-radius:4px; border:1px solid rgba(255,255,255,.25);
    }
    #debugBox{
      position:fixed; left:12px; top:12px;
      max-width:520px; z-index:10;
      font-size:11px; line-height:1.3;
      color:#9ef; background:rgba(0,0,0,.55);
      padding:8px 10px; border-radius:12px;
      display:none; white-space:pre-wrap; word-break:break-word;
    }
  </style>
</head>
<body>
  <!-- Hidden inputs triggered by dat.GUI actions -->
  <input type="file" id="svgUpload" accept=".svg" style="display:none" />

  <div id="swatchesBar" aria-hidden="true"></div>
  <pre id="debugBox"></pre>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js"></script>
  <script src="visuals_app.js"></script>
</body>
</html>
