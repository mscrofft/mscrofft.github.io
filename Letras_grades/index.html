<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <title>p5.js — Letras por grade e camadas (dat.GUI)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>
  <!-- CCapture para fallback WebM -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ccapture.js/1.1.0/CCapture.all.min.js"></script>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#0b0b0d}
    canvas{display:block;background:#000}
    #canvasHost{position:fixed; inset:0;}
    /* small help overlay */
    #hint{
      position:fixed; left:12px; bottom:12px; z-index:10;
      font:12px/1.35 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:rgba(255,255,255,.75);
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.10);
      padding:8px 10px; border-radius:12px;
      backdrop-filter: blur(6px);
      max-width:520px;
      pointer-events:none;
    }
  </style>
</head>
<body>
  <!-- Hidden file input triggered by dat.GUI -->
  <input id="imgInput" type="file" accept="image/*" style="display:none"/>
  <div id="canvasHost"></div>
  <div id="hint">Use o dat.GUI (canto superior direito) para controlar entrada, camadas, export e gravação.</div>
  <script src="sketch.js"></script>
</body>
</html>
