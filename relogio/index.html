<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio Cromático</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/ui-theme.css"/>
    <style>
        :root {
            --dark: #141413;
            --light: #faf9f5;
            --mid-gray: #b0aea5;
            --light-gray: #e8e6dc;
            --orange: #d97757;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--ui-font);
            background: var(--ui-bg-canvas);
            min-height: 100vh;
            display: flex;
            color: var(--ui-fg);
        }
        .container { display: flex; width: 100%; min-height: 100vh; padding: 20px; gap: 20px; }

        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: var(--ui-bg-panel);
            border: 1px solid var(--ui-border);
            padding: 20px 16px;
            border-radius: var(--ui-radius);
            overflow-y: auto;
            font-family: var(--ui-font);
            color: var(--ui-fg);
        }
        .sidebar h1 { font-family: var(--ui-font); font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 6px; }
        .sidebar .sub { color: var(--ui-muted); font-size: 10px; margin-bottom: 18px; line-height: 1.5; }
        .section-title {
            font-family: var(--ui-font);
            font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em;
            color: var(--ui-muted); margin-bottom: 10px;
        }
        .section { margin-bottom: 18px; }
        .divider { height: 1px; background: var(--ui-border); margin: 4px 0 16px; }

        .time-box {
            font-family: var(--ui-font); font-size: 24px; font-weight: 500;
            text-align: center; padding: 10px 8px;
            background: transparent; border-radius: var(--ui-radius);
            border: 1px solid var(--ui-border); margin-bottom: 6px;
            letter-spacing: 0.04em;
            color: var(--ui-fg);
        }
        .date-box { font-size: 10px; color: var(--ui-muted); text-align: center; margin-bottom: 2px; }

        .ctrl { margin-bottom: 10px; }
        .ctrl label { display: block; font-size: 10px; font-weight: 500; margin-bottom: 5px; color: var(--ui-fg); opacity: 0.8; }
        .row { display: flex; align-items: center; gap: 8px; }
        input[type=range] {
            flex: 1; height: 2px; background: var(--ui-border);
            border-radius: 1px; outline: none; -webkit-appearance: none; cursor: pointer;
            accent-color: var(--ui-fg);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 10px; height: 10px;
            background: var(--ui-fg); border-radius: 50%; cursor: pointer;
        }
        .val { font-family: var(--ui-font); font-size: 9px; color: var(--ui-muted); min-width: 32px; text-align: right; }

        .toggles { display: flex; gap: 5px; flex-wrap: wrap; }
        .tog {
            padding: 4px 9px; border: 1px solid var(--ui-border); border-radius: var(--ui-radius);
            background: transparent; font-size: 9px; font-family: var(--ui-font);
            letter-spacing: 0.08em; text-transform: uppercase;
            cursor: pointer; transition: all 0.18s; color: var(--ui-fg); opacity: 0.6;
        }
        .tog.on { background: var(--ui-fg); border-color: var(--ui-fg); color: var(--ui-bg); opacity: 1; }

        .color-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .color-row label { font-size: 10px; font-weight: 500; color: var(--ui-fg); opacity: 0.8; }
        .cp-wrap { display: flex; align-items: center; gap: 6px; }
        input[type=color] { width: 22px; height: 14px; border: 1px solid var(--ui-border); border-radius: 1px; cursor: pointer; background: none; padding: 0; }
        .cv { font-family: var(--ui-font); font-size: 9px; color: var(--ui-muted); }

        .btn {
            width: 100%; padding: 6px; border: 1px solid var(--ui-border);
            border-radius: var(--ui-radius); background: transparent; font-family: var(--ui-font);
            font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
            cursor: pointer; transition: all 0.18s; color: var(--ui-fg);
        }
        .btn:hover { background: var(--ui-fg); color: var(--ui-bg); border-color: var(--ui-fg); }

        .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .leg { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--ui-muted); font-family: var(--ui-font); }
        .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

        .sidebar-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }

        .canvas-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
        }
        #canvas-container canvas {
            border-radius: var(--ui-radius);
            display: block;
        }
    </style>
</head>
<body>
<a class="ui-back" href="../index.html">&lt; back</a>
<div class="container">
    <div class="sidebar">
        <div class="sidebar-head">
          <h1>Relógio Cromático</h1>
          <button class="ui-invert-btn" id="ui-invert"><svg viewBox="0 0 16 16"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 12.5A5.5 5.5 0 0 1 8 2.5v11a5.5 5.5 0 0 1 0-11z"/></svg> Inverter</button>
        </div>
        <p class="sub">Setores cromáticos suaves substituem marcações tradicionais de horas.</p>

        <div class="section">
            <div class="section-title">Horário</div>
            <div class="time-box" id="time-txt">--:--:--</div>
            <div class="date-box" id="date-txt">—</div>
        </div>
        <div class="divider"></div>

        <div class="section">
            <div class="section-title">Setores</div>
            <div class="legend">
                <div class="leg"><div class="leg-dot" id="dot-rosa" style="background:#f4a0b0"></div><span>Minutos</span></div>
                <div class="leg"><div class="leg-dot" id="dot-azul" style="background:#7ec8e3"></div><span>Horas</span></div>
                <div class="leg"><div class="leg-dot" id="dot-verde" style="background:#88c580"></div><span>Segundos</span></div>
                <div class="leg"><div class="leg-dot" id="dot-roxo" style="background:#8b5e8b"></div><span>Dia</span></div>
            </div>
        </div>
        <div class="divider"></div>

        <div class="section">
            <div class="section-title">Ponteiros</div>
            <div class="ctrl">
                <div class="toggles">
                    <button class="tog on" id="t-h" onclick="toggleH('h')">Horas</button>
                    <button class="tog on" id="t-m" onclick="toggleH('m')">Minutos</button>
                    <button class="tog on" id="t-s" onclick="toggleH('s')">Segundos</button>
                </div>
            </div>
            <div class="ctrl">
                <label>Espessura</label>
                <div class="row">
                    <input type="range" id="hw" min="1" max="6" step="0.5" value="2"
                        oninput="P.handW=+this.value;document.getElementById('hw-v').textContent=this.value">
                    <span class="val" id="hw-v">2</span>
                </div>
            </div>
        </div>
        <div class="divider"></div>

        <div class="section">
            <div class="section-title">Aparência</div>
            <div class="ctrl">
                <label>Opacidade setores</label>
                <div class="row">
                    <input type="range" id="op" min="80" max="255" step="5" value="200"
                        oninput="P.alpha=+this.value;document.getElementById('op-v').textContent=this.value">
                    <span class="val" id="op-v">200</span>
                </div>
            </div>
            <div class="ctrl">
                <label>Brilho centro</label>
                <div class="row">
                    <input type="range" id="glow" min="0" max="1" step="0.05" value="0.7"
                        oninput="P.glow=+this.value;document.getElementById('glow-v').textContent=this.value">
                    <span class="val" id="glow-v">0.7</span>
                </div>
            </div>
        </div>
        <div class="divider"></div>

        <div class="section">
            <div class="section-title">Cores</div>
            <div class="color-row">
                <label>Rosa – Minutos</label>
                <div class="cp-wrap">
                    <input type="color" value="#f4a0b0"
                        oninput="P.cRosa=this.value;document.getElementById('cv-rosa').textContent=this.value;document.getElementById('dot-rosa').style.background=this.value">
                    <span class="cv" id="cv-rosa">#f4a0b0</span>
                </div>
            </div>
            <div class="color-row">
                <label>Azul – Horas</label>
                <div class="cp-wrap">
                    <input type="color" value="#7ec8e3"
                        oninput="P.cAzul=this.value;document.getElementById('cv-azul').textContent=this.value;document.getElementById('dot-azul').style.background=this.value">
                    <span class="cv" id="cv-azul">#7ec8e3</span>
                </div>
            </div>
            <div class="color-row">
                <label>Verde – Segundos</label>
                <div class="cp-wrap">
                    <input type="color" value="#88c580"
                        oninput="P.cVerde=this.value;document.getElementById('cv-verde').textContent=this.value;document.getElementById('dot-verde').style.background=this.value">
                    <span class="cv" id="cv-verde">#88c580</span>
                </div>
            </div>
            <div class="color-row">
                <label>Roxo – Dia</label>
                <div class="cp-wrap">
                    <input type="color" value="#8b5e8b"
                        oninput="P.cRoxo=this.value;document.getElementById('cv-roxo').textContent=this.value;document.getElementById('dot-roxo').style.background=this.value">
                    <span class="cv" id="cv-roxo">#8b5e8b</span>
                </div>
            </div>
        </div>
        <div class="divider"></div>

        <div class="section">
            <div class="section-title">Ações</div>
            <button class="btn" onclick="resetAll()">↺ Restaurar padrão</button>
        </div>
    </div>

    <div class="canvas-area">
        <div id="canvas-container"></div>
    </div>
</div>

<script src="../shared/ui-theme-lite.js"></script>
<script>
document.getElementById('ui-invert').addEventListener('click', () => UITheme.toggleTheme());
</script>
<script>
// ─── Global params ──────────────────────────────────────────────────────────
let P = {
    handW: 2, alpha: 200, glow: 0.7,
    cRosa: '#f4a0b0', cAzul: '#7ec8e3', cVerde: '#88c580', cRoxo: '#8b5e8b',
    showH: true, showM: true, showS: true
};
const DEF = {...P};

function toggleH(k) {
    if (k==='h') { P.showH=!P.showH; document.getElementById('t-h').classList.toggle('on',P.showH); }
    if (k==='m') { P.showM=!P.showM; document.getElementById('t-m').classList.toggle('on',P.showM); }
    if (k==='s') { P.showS=!P.showS; document.getElementById('t-s').classList.toggle('on',P.showS); }
}

function resetAll() {
    P = {...DEF};
    document.getElementById('hw').value = P.handW;  document.getElementById('hw-v').textContent = P.handW;
    document.getElementById('op').value = P.alpha;  document.getElementById('op-v').textContent = P.alpha;
    document.getElementById('glow').value = P.glow; document.getElementById('glow-v').textContent = P.glow;
    ['h','m','s'].forEach(k => document.getElementById('t-'+k).classList.add('on'));
}

function hexRgb(h) {
    return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

// ─── p5 sketch ──────────────────────────────────────────────────────────────
new p5(function(p) {
    let SZ;

    p.setup = function() {
        SZ = Math.min(window.innerWidth - 340, window.innerHeight - 40, 680);
        SZ = Math.max(SZ, 300);
        p.createCanvas(SZ, SZ).parent('canvas-container');
        p.angleMode(p.RADIANS);
        p.smooth();
        p.frameRate(30);
    };

    p.windowResized = function() {
        SZ = Math.min(window.innerWidth - 340, window.innerHeight - 40, 680);
        SZ = Math.max(SZ, 300);
        p.resizeCanvas(SZ, SZ);
    };

    p.draw = function() {
        p.background(250, 249, 245);

        const cx = SZ/2, cy = SZ/2;
        const R  = SZ * 0.40;

        // ── Time ────────────────────────────────────────────────────────────
        const now = new Date();
        const h  = now.getHours(), m = now.getMinutes();
        const s  = now.getSeconds(), ms = now.getMilliseconds();

        const sFrac = (s + ms/1000) / 60;           // 0-1 smooth seconds
        const mFrac = (m + sFrac)   / 60;           // 0-1 smooth minutes
        const hFrac = ((h%12) + mFrac) / 12;        // 0-1 smooth hours
        const dFrac = (h*3600 + m*60 + s) / 86400;  // 0-1 day progress

        // ── Sector sizes ────────────────────────────────────────────────────
        // Map each fraction to an arc size; minimum ~15° so always visible
        const TWO_PI = Math.PI * 2;
        const minArc = 0.26; // ~15°

        let aV = Math.max(minArc, sFrac * TWO_PI);  // verde  = seconds
        let aB = Math.max(minArc, hFrac * TWO_PI);  // azul   = hours
        let aP = Math.max(minArc, mFrac * TWO_PI);  // rosa   = minutes (biggest)
        let aR = Math.max(minArc, dFrac * TWO_PI);  // roxo   = day %

        const tot = aV + aB + aP + aR;
        aV = aV/tot * TWO_PI; aB = aB/tot * TWO_PI;
        aP = aP/tot * TWO_PI; aR = aR/tot * TWO_PI;

        // Order: verde(top) → azul(right) → rosa(bottom) → roxo(left)
        const a0 = -Math.PI / 2;
        const a1 = a0 + aV;
        const a2 = a1 + aB;
        const a3 = a2 + aP;

        // ── Draw sectors ────────────────────────────────────────────────────
        drawSector(cx, cy, R, a0, a1, P.cVerde);
        drawSector(cx, cy, R, a1, a2, P.cAzul);
        drawSector(cx, cy, R, a2, a3, P.cRosa);
        drawSector(cx, cy, R, a3, a0+TWO_PI, P.cRoxo);

        // Radial white-to-transparent overlay (degradê interno)
        drawRadialFade(cx, cy, R, P.glow);

        // ── Ring & hour dots ────────────────────────────────────────────────
        p.noFill(); p.stroke(195, 192, 185, 130); p.strokeWeight(1.2);
        p.circle(cx, cy, R*2);

        for (let i=0; i<60; i++) {
            const a  = -Math.PI/2 + (i/60)*TWO_PI;
            const rr = (i%5===0) ? R*0.895 : R*0.92;
            const sz = (i%5===0) ? 3.5 : 1.8;
            p.fill(i%5===0 ? [100,98,93,210] : [170,168,162,140]);
            p.noStroke();
            p.circle(cx + Math.cos(a)*rr, cy + Math.sin(a)*rr, sz);
        }

        // ── Hands ───────────────────────────────────────────────────────────
        const hw = P.handW;

        if (P.showS) {   // Second – thin, long, warm gray
            const sa = -Math.PI/2 + sFrac * TWO_PI;
            p.stroke(160, 155, 145, 210); p.strokeWeight(hw*0.7); p.strokeCap(p.ROUND);
            p.line(cx - Math.cos(sa)*R*0.16, cy - Math.sin(sa)*R*0.16,
                   cx + Math.cos(sa)*R*0.90, cy + Math.sin(sa)*R*0.90);
        }

        if (P.showM) {   // Minute – medium, very dark
            const ma = -Math.PI/2 + mFrac * TWO_PI;
            p.stroke(25, 22, 18); p.strokeWeight(hw*1.3); p.strokeCap(p.ROUND);
            p.line(cx - Math.cos(ma)*R*0.13, cy - Math.sin(ma)*R*0.13,
                   cx + Math.cos(ma)*R*0.80, cy + Math.sin(ma)*R*0.80);
        }

        if (P.showH) {   // Hour – short, thick, black
            const ha = -Math.PI/2 + hFrac * TWO_PI;
            p.stroke(15, 13, 10); p.strokeWeight(hw*2.4); p.strokeCap(p.ROUND);
            p.line(cx - Math.cos(ha)*R*0.11, cy - Math.sin(ha)*R*0.11,
                   cx + Math.cos(ha)*R*0.56, cy + Math.sin(ha)*R*0.56);
        }

        // Center axle
        p.noStroke(); p.fill(18, 16, 12); p.circle(cx, cy, hw*8);
        p.fill(255, 253, 250, 160); p.circle(cx, cy, hw*2.8);

        // ── DOM clock ───────────────────────────────────────────────────────
        const pad = n => String(n).padStart(2,'0');
        document.getElementById('time-txt').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
        const DS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
        const MS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
        document.getElementById('date-txt').textContent =
            `${DS[now.getDay()]}, ${now.getDate()} ${MS[now.getMonth()]} ${now.getFullYear()}`;
    };

    // ── Gradient-filled sector ───────────────────────────────────────────────
    function drawSector(cx, cy, R, startA, endA, hex) {
        const [r,g,b] = hexRgb(hex);
        const steps = 48;
        const span  = endA - startA;
        p.noStroke();
        for (let i=0; i<steps; i++) {
            const a0 = startA + (i/steps)*span;
            const a1 = startA + ((i+1)/steps)*span;
            p.fill(r, g, b, P.alpha);
            p.beginShape();
            p.vertex(cx, cy);
            for (let j=0; j<=4; j++) {
                const aa = a0 + (j/4)*(a1-a0);
                p.vertex(cx + Math.cos(aa)*R, cy + Math.sin(aa)*R);
            }
            p.endShape(p.CLOSE);
        }
    }

    // ── Radial white fade from center ────────────────────────────────────────
    function drawRadialFade(cx, cy, R, strength) {
        const steps = 50;
        p.noStroke();
        for (let k=0; k<steps; k++) {
            const t  = k/steps;
            const t1 = (k+1)/steps;
            const white = Math.pow(1 - t, 1.6) * strength * 255;
            p.fill(255, 255, 255, white);
            p.circle(cx, cy, t1 * R * 2);
        }
    }

}, 'canvas-container');
</script>
</body>
</html>
